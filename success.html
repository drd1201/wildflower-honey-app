<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You! — Wildflower Honey Shop</title>
<style>
:root {
  --amber: #D4880F; --amber-light: #F5C542; --amber-dark: #8B5E0B; --honey: #FFF3D6; --cream: #FFFDF7; --brown: #3E2723; --brown-light: #5D4037; --green: #2E7D32; --red: #C62828; --gray: #616161; --border: #E0D5C1; --shadow: 0 2px 12px rgba(0,0,0,.08); --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--brown); line-height: 1.6; }
a { color: var(--amber-dark); text-decoration: none; }

header { background: linear-gradient(135deg, var(--amber-dark) 0%, var(--amber) 100%); color: #fff; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
.logo span { font-size: 1.8rem; }
nav { display: flex; gap: 20px; align-items: center; }
nav a { color: #fff; font-weight: 600; font-size: .95rem; opacity: .9; transition: opacity .2s; }

.success-container { max-width: 640px; margin: 80px auto; padding: 48px 32px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
.check-icon { font-size: 5rem; margin-bottom: 16px; display: block; animation: popIn 0.5s ease; }
@keyframes popIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
.success-container h1 { font-size: 2.4rem; color: var(--green); margin-bottom: 8px; }
.success-container .subtitle { font-size: 1.15rem; color: var(--brown-light); margin-bottom: 32px; }
.order-details { background: var(--honey); border: 1px solid var(--amber-light); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; text-align: left; }
.order-details .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.order-details .detail-row:last-child { border-bottom: none; }
.detail-label { font-weight: 600; color: var(--gray); }
.detail-value { font-weight: 700; color: var(--brown); }
.home-btn { display: inline-block; background: var(--amber); color: #fff; border: none; padding: 14px 36px; border-radius: 8px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: background 0.2s; text-decoration: none; }
.home-btn:hover { background: var(--amber-dark); color: #fff; }
.note { margin-top: 24px; font-size: 0.9rem; color: var(--gray); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/" class="logo" style="color:#fff;text-decoration:none;">🍯 Wildflower Honey Shop</a>
    <nav>
      <a href="/">Shop</a>
      <a href="/game.html">🎮 Game</a>
    </nav>
  </div>
</header>

<div class="success-container">
  <span class="check-icon">✅</span>
  <h1>Thank You!</h1>
  <p class="subtitle">Your order has been confirmed and is being prepared with care.</p>

  <div class="order-details" id="orderDetails">
    <div class="detail-row">
      <span class="detail-label">Order ID</span>
      <span class="detail-value" id="orderId">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Total Charged</span>
      <span class="detail-value" id="orderTotal">—</span>
    </div>
  </div>

  <a href="/" class="home-btn">🏠 Back to Home</a>

  <p class="note">A confirmation email will be sent to your PayPal email address.<br>Questions? Email us at <strong>support@wildflowerhoney.shop</strong></p>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var orderId = params.get('order_id');
  var total = params.get('total');

  if (orderId) {
    document.getElementById('orderId').textContent = orderId;
  }
  if (total) {
    var amount = parseFloat(total);
    document.getElementById('orderTotal').textContent = isNaN(amount) ? total : '$' + amount.toFixed(2);
  }

  // Clear the cart after successful purchase
  try { localStorage.removeItem('honeyCart'); } catch(e) {}
})();
</script>
</body>
</html>
