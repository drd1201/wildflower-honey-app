<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍯 Honey Match — Wildflower Honey Shop</title>
<style>
body { font-family: sans-serif; text-align: center; background: #FFFDF7; padding: 40px 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 30px auto; }
.card { aspect-ratio: 1; background: #D4880F; color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.back-link { display:inline-block; margin-top:30px; color:#D4880F; font-weight:700; text-decoration:none; }
</style>
</head>
<body>
<h1>🍯 Honey Match Game</h1>
<p>Match the jars to find your discount!</p>
<div class="grid" id="grid"></div>
<a href="/index.html" class="back-link">← Back to Shop</a>
<script>
const emojis = ['🍯', '🍯', '🌸', '🌸', '🍀', '🍀', '🌿', '🌿', '🌾', '🌾', '🍊', '🍊', '🎁', '🎁', '🐝', '🐝'];
emojis.sort(() => Math.random() - 0.5).forEach(e => {
  const c = document.createElement('div');
  c.className = 'card';
  c.textContent = '?';
  c.onclick = () => { if(c.textContent==='?') c.textContent = e; else c.textContent = '?'; };
  document.getElementById('grid').appendChild(c);
});
</script>
</body>
</html>
